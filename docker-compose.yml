# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15
    container_name: collectly_db
    environment:
      POSTGRES_USER: collectly
      POSTGRES_PASSWORD: collectly_password
      POSTGRES_DB: collectly_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collectly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: collectly_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: collectly_web
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - DATABASE_URL=postgresql://collectly:collectly_password@db:5432/collectly_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    container_name: collectly_celery
    command: celery -A core worker --loglevel=info --without-gossip --without-mingle --without-heartbeat
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - DATABASE_URL=postgresql://collectly:collectly_password@db:5432/collectly_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    container_name: collectly_celery_beat
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - DATABASE_URL=postgresql://collectly:collectly_password@db:5432/collectly_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: