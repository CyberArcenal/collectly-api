# docker-compose.yml
version: '3.8'

services:
  db:
    container_name: collectly_db
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: collectly_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: collectly_web
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - .:/app
      - shared_temp:/shared_temp 
    ports:
      - "8001:8001"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - DATABASE_URL=${POSTGRES_URL}
      - REDIS_URL=redis://redis:6379/0
      - TMPDIR=/shared_temp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    container_name: collectly_celery
    command: celery -A core worker --loglevel=info --without-gossip --without-mingle --without-heartbeat
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - DATABASE_URL=${POSTGRES_URL}
      - REDIS_URL=redis://redis:6379/0
      - TMPDIR=/shared_temp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    container_name: collectly_celery_beat
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
      - shared_temp:/shared_temp 
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - DATABASE_URL=${POSTGRES_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  shared_temp: