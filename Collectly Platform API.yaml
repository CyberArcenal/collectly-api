  /handshake/:
    post:
      operationId: handshake_create
      description: Handshake endpoint for initial client-server communication. Validates
        client version compatibility, checks database schema, and returns server capabilities
        and sync settings.
      tags:
      - System
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandshakeRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HandshakeRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HandshakeRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandshakeResponse'
              examples:
                SuccessfulHandshake:
                  value:
                    status: ok
                    server_version: 1.0.0
                    min_client_version: 1.0.0
                    expected_schema_version: '1'
                    sync_enabled: true
                    ping_ms: 42
                    features:
                    - sync
                    - audit_logs
                    - analytics
                    message: Handshake successful
                  summary: Successful handshake
                OutdatedClient:
                  value:
                    status: outdated
                    server_version: 1.0.0
                    min_client_version: 1.0.0
                    expected_schema_version: '1'
                    sync_enabled: true
                    ping_ms: 45
                    features:
                    - sync
                    - audit_logs
                    - analytics
                    required_version: 1.0.0
                    message: Client version is outdated. Please update.
                  summary: Outdated client
                SchemaMismatch:
                  value:
                    status: error
                    server_version: 1.0.0
                    min_client_version: 1.0.0
                    expected_schema_version: '1'
                    sync_enabled: true
                    ping_ms: 43
                    features:
                    - sync
                    - audit_logs
                    - analytics
                    message: Database schema version mismatch. Please run migrations.
                  summary: Schema mismatch
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandshakeErrorResponse'
          description: ''
