  /api/v1/audit/action/:
    get:
      operationId: api_v1_audit_action_retrieve
      description: Get audit logs filtered by action.
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: Action type
        required: true
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Items per page
      tags:
