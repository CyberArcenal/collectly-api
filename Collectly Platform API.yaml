      type: object
      properties:
        status:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: {}
      required:
      - data
      - message
      - status
    ApplyForgivenessRequestRequest:
      type: object
      properties:
        amountForgiven:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        reason:
          type: string
          nullable: true
          minLength: 1
      required:
      - amountForgiven
    AuditLogCountsResponse:
      type: object
      properties:
        status:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: {}
      required:
      - data
      - message
      - status
    AuditLogCreateResponse:
      type: object
      description: Full response for POST /audit-logs/ (201 Created)
      properties:
        status:
          type: boolean
          default: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuditLogRead'
      required:
      - data
      - message
    AuditLogErrorResponse:
      type: object
      description: Generic error response
      properties:
        status:
          type: boolean
          default: false
        detail:
          type: string
      required:
      - detail
    AuditLogList:
      type: object
      description: Lightweight read-only serializer for listing audit logs.
      properties:
        id:
          type: integer
          readOnly: true
        event_id:
          type: string
          format: uuid
          readOnly: true
        user_display:
          type: string
          readOnly: true
        action_type:
          $ref: '#/components/schemas/ActionTypeEnum'
        action_type_display:
