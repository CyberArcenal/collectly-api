          description: ''
  /api/v1/audit/entity/:
    get:
      operationId: api_v1_audit_entity_retrieve
      description: Get audit logs filtered by entity.
      parameters:
      - in: query
        name: entity
        schema:
          type: string
        description: Entity name
        required: true
      - in: query
        name: entityId
        schema:
          type: integer
        description: Optional entity ID
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Items per page
      tags:
      - Audit Logs
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
