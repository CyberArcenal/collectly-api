        name: endDate
        schema:
          type: string
        description: End date (YYYY-MM-DD)
      - in: query
        name: period
        schema:
          type: string
          default: month
        description: 'Period: ''today'', ''week'', ''month'', ''year'''
      - in: query
        name: startDate
        schema:
          type: string
        description: Start date (YYYY-MM-DD)
      tags:
      - Dashboard
      security:
      - tokenAuth: []
      - jwtAuth: []
