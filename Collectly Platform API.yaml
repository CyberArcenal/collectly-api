  /api/v1/audit/logs/:
    get:
      operationId: api_v1_audit_logs_retrieve
      description: Retrieve a single audit log (if id provided) or a paginated list
        of all logs with optional filters. Admin users can access all logs; regular
        users can only access their own.
      parameters:
      - in: query
        name: action_type
        schema:
          type: string
        description: Filter by action type
      - in: query
        name: end
        schema:
          type: string
        description: End date (ISO datetime)
      - in: query
        name: model_name
        schema:
          type: string
        description: Filter by model name
      - in: query
        name: object_id
        schema:
          type: string
        description: Filter by object ID
      - in: query
        name: page
        schema:
          type: integer
        description: Page number for pagination
      - in: query
        name: page_size
        schema:
          type: integer
        description: Number of items per page
      - in: query
        name: q
        schema:
          type: string
        description: Free-text search
      - in: query
        name: start
        schema:
          type: string
        description: Start date (ISO datetime)
      - in: query
        name: suspicious
        schema:
          type: boolean
        description: Filter by suspicious status
      - in: query
        name: user_id
        schema:
          type: integer
        description: Filter by user ID
      tags:
      - Audit Logs
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
              examples:
                ListResponse:
                  value:
                    status: true
                    message: Success
                    pagination:
                      next: http://example.com/api/v1/audit-logs/?page=2&page_size=10
                      previous: null
                      count: 25
                      current_page: 1
                      total_pages: 3
                      page_size: 10
                    data:
                    - id: 1
                      event_id: c3f9a2d0-1234-5678-9abc-def012345678
                      user_display: johndoe
                      action_type: login
                      action_type_display: Login
                      model_name: User
                      object_id: '1'
                      is_suspicious: false
                      timestamp: '2025-01-01T00:00:00Z'
                  summary: List response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
    post:
      operationId: api_v1_audit_logs_create
      description: Create a new audit log entry. Admin/Staff only. Audit logs are
        immutable and cannot be updated or deleted.
      tags:
      - Audit Logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogWriteRequest'
            examples:
              CreateAuditLogRequest:
                value:
                  user: 1
                  action_type: login
                  model_name: User
                  object_id: '1'
                  changes:
                    detail: User logged in
                  ip_address: 192.168.1.100
                  user_agent: Mozilla/5.0...
                  is_suspicious: false
                summary: Create audit log request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuditLogWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuditLogWriteRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogCreateResponse'
              examples:
                CreateResponse:
                  value:
                    status: true
                    message: Success
                    data:
                      id: 1
                      event_id: c3f9a2d0-1234-5678-9abc-def012345678
                      user: 1
                      user_display: johndoe
                      action_type: login
                      action_type_display: Login
                      model_name: User
                      object_id: '1'
                      changes:
                        detail: User logged in
                      ip_address: 192.168.1.100
                      user_agent: Mozilla/5.0...
                      is_suspicious: false
                      suspicious_reason: null
                      timestamp: '2025-01-01T00:00:00Z'
                      summary: '[login] User (1) by johndoe'
                  summary: Create response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogValidationError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
    delete:
      operationId: api_v1_audit_logs_destroy
      description: Delete an audit log. Admin/Staff only. This operation cannot be
        undone and should be used with caution.
      tags:
      - Audit Logs
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccessResponse'
              examples:
                SuccessResponse:
                  value:
                    status: true
                    message: Audit log deleted successfully.
                  summary: Success response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
              examples:
                NotFound:
                  value:
                    status: false
                    detail: Audit log not found.
                  summary: Not found
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogErrorResponse'
          description: ''
